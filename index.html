<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Alex · Personal</title>
<style>
  :root{--ink:#2b2118;--paper:#faf6ef;--card:#fff;--line:#e7ddcd;--terra:#c0562f;--terra-dk:#9a4023;--muted:#7c6f5e;--sea:#2f6f7a}
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"Iowan Old Style",Palatino,Georgia,serif;line-height:1.5}
  .wrap{max-width:720px;margin:0 auto;padding:48px 22px 70px}
  header{text-align:center;border-bottom:3px double var(--terra);padding-bottom:22px;margin-bottom:26px}
  .kicker{letter-spacing:.32em;text-transform:uppercase;font-size:12px;color:var(--terra-dk);font-weight:700}
  h1{font-size:34px;margin:10px 0 4px}
  .sub{color:var(--muted);font-style:italic;margin:0}
  .grid{display:grid;gap:14px}
  a.card{display:flex;align-items:center;gap:16px;text-decoration:none;color:inherit;background:var(--card);
    border:1px solid var(--line);border-left:5px solid var(--terra);border-radius:14px;padding:18px 20px;
    box-shadow:0 2px 10px rgba(70,50,20,.05);transition:transform .12s,box-shadow .12s}
  a.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(70,50,20,.10)}
  .emoji{font-size:30px;line-height:1}
  .ttl{font-size:20px;font-weight:700}
  .meta{color:var(--muted);font-size:14px;margin-top:2px}
  footer{margin-top:34px;color:var(--muted);font-size:13px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Personal Hub</div>
    <h1>Alex's Pages</h1>
    <p class="sub">Guides, itineraries &amp; convenience pages.</p>
  </header>
  <div class="grid">
    <a class="card" href="./spain-2026/">
      <span class="emoji">🇪🇸</span>
      <span class="ct">
        <span class="ttl">Spain &amp; Barcelona 2026</span>
        <span class="meta">27 Jul – 4 Aug · day-by-day itinerary · 🔒 password protected</span>
      </span>
    </a>
  </div>
  <footer>More to come.</footer>
</div>
</body>
</html>
