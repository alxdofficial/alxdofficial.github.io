<style>
 *{box-sizing:border-box}
 html,body{height:100%}
 body{margin:0;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
   padding:20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));
   background:#0d1220;color:#f0ebe9;font-family:"Hanken Grotesk",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
 .gate{width:100%;max-width:360px;text-align:center;background:#161d30;border:1px solid #262f4a;border-top:3px solid #b3283f;
   border-radius:14px;padding:32px 26px;box-shadow:0 14px 38px rgba(0,0,0,.34)}
 .gate .k{letter-spacing:.05em;text-transform:uppercase;font-size:11px;color:#b3283f;font-weight:700}
 .gate h1{font-size:22px;margin:10px 0 4px;line-height:1.2}
 .gate p{color:#a68b93;font-size:14px;margin:0 0 20px}
 .gate input{width:100%;font-size:20px;text-align:center;letter-spacing:.35em;text-indent:.35em;
   padding:13px 12px;border:1px solid #333d5c;border-radius:10px;background:#19203150;background:#141a2c;color:#f0ebe9;outline:none;-webkit-appearance:none;appearance:none}
 .gate input::placeholder{color:#5a4e56}
 .gate input:focus{border-color:#b3283f;box-shadow:0 0 0 3px rgba(179,40,63,.28)}
 .gate button{margin-top:14px;width:100%;font-size:16px;font-weight:700;color:#fff;background:#b3283f;
   border:none;border-radius:10px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
 .gate button:hover{background:#8f1f32} .gate button:active{transform:translateY(1px)}
 .err{color:#e8a3ac;font-size:13px;min-height:18px;margin-top:10px}
</style></head>
