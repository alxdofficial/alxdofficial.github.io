<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<style>
 *{box-sizing:border-box}
 html,body{height:100%}
 body{margin:0;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
   padding:20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));
   background:#f3f4f2;color:#191b1f;font-family:"Hanken Grotesk",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
 .gate{width:100%;max-width:360px;text-align:center;background:#fff;border:1px solid #e3e4e0;border-top:3px solid #2a4fb0;
   border-radius:14px;padding:32px 26px;box-shadow:0 8px 30px rgba(20,25,40,.06)}
 .gate .k{letter-spacing:.05em;text-transform:uppercase;font-size:11px;color:#2a4fb0;font-weight:700}
 .gate h1{font-size:22px;margin:10px 0 4px;line-height:1.2}
 .gate p{color:#565c62;font-size:14px;margin:0 0 20px}
 .gate input{width:100%;font-size:20px;text-align:center;letter-spacing:.35em;text-indent:.35em;
   padding:13px 12px;border:1px solid #d8d8d3;border-radius:10px;background:#f7f7f5;color:#191b1f;outline:none;-webkit-appearance:none;appearance:none}
 .gate input::placeholder{color:#b7b7b1}
 .gate input:focus{border-color:#2a4fb0;box-shadow:0 0 0 3px rgba(42,79,176,.16)}
 .gate button{margin-top:14px;width:100%;font-size:16px;font-weight:700;color:#fff;background:#2a4fb0;
   border:none;border-radius:10px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
 .gate button:hover{background:#20397f} .gate button:active{transform:translateY(1px)}
 .err{color:#b23b3b;font-size:13px;min-height:18px;margin-top:10px}
 @media (prefers-color-scheme:dark){
   body{background:#141519;color:#eceded}
   .gate{background:#1c1e23;border-color:#2b2d33;box-shadow:none}
   .gate p{color:#a3a8af} .gate input{background:#212328;border-color:#3b3e45;color:#eceded}
 }
</style></head>
