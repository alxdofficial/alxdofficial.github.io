<style>
 *{box-sizing:border-box}
 html,body{height:100%}
 body{margin:0;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
   padding:20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));
   background:#1a2230;color:#e9ebf0;font-family:"Hanken Grotesk",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
 .gate{width:100%;max-width:360px;text-align:center;background:#222c3d;border:1px solid #313d52;border-top:3px solid #dd5064;
   border-radius:14px;padding:32px 26px;box-shadow:0 12px 34px rgba(0,0,0,.28)}
 .gate .k{letter-spacing:.05em;text-transform:uppercase;font-size:11px;color:#dd5064;font-weight:700}

 .gate input{width:100%;font-size:20px;text-align:center;letter-spacing:.35em;text-indent:.35em;
   padding:13px 12px;border:1px solid #3a465c;border-radius:10px;background:#1f2836;color:#e9ebf0;outline:none;-webkit-appearance:none;appearance:none}
 .gate input::placeholder{color:#5a6577}
 .gate input:focus{border-color:#dd5064;box-shadow:0 0 0 3px rgba(221,80,100,.22)}
 .gate button{margin-top:14px;width:100%;font-size:16px;font-weight:700;color:#fff;background:#dd5064;
   border:none;border-radius:10px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
 .gate button:hover{background:#c33048} .gate button:active{transform:translateY(1px)}
 .err{color:#f0a6b1;font-size:13px;min-height:18px;margin-top:10px}
</style></head>
