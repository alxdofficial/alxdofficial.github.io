<style>
 *{box-sizing:border-box}
 html,body{height:100%}
 body{margin:0;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
   padding:20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));
   background:#141a29;color:#efe9ea;font-family:"Hanken Grotesk",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
 .gate{width:100%;max-width:360px;text-align:center;background:#1d2539;border:1px solid #2c3550;border-top:3px solid #d94a60;
   border-radius:14px;padding:32px 26px;box-shadow:0 14px 38px rgba(0,0,0,.34)}
 .gate .k{letter-spacing:.05em;text-transform:uppercase;font-size:11px;color:#d94a60;font-weight:700}

 .gate input{width:100%;font-size:20px;text-align:center;letter-spacing:.35em;text-indent:.35em;
   padding:13px 12px;border:1px solid #38425e;border-radius:10px;background:#19203150;background:#182031;color:#efe9ea;outline:none;-webkit-appearance:none;appearance:none}
 .gate input::placeholder{color:#5f5560}
 .gate input:focus{border-color:#d94a60;box-shadow:0 0 0 3px rgba(217,74,96,.22)}
 .gate button{margin-top:14px;width:100%;font-size:16px;font-weight:700;color:#fff;background:#d94a60;
   border:none;border-radius:10px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
 .gate button:hover{background:#b83349} .gate button:active{transform:translateY(1px)}
 .err{color:#eba7b0;font-size:13px;min-height:18px;margin-top:10px}
</style></head>
