 *{box-sizing:border-box}
 html,body{height:100%}

   padding:20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));

   padding:13px 12px;border:1px solid #333d5c;background:#19203150;background:#141a2c;color:#d8cdca;outline:none;-webkit-appearance:none;appearance:none}
 .gate input::placeholder{color:#5a4e56}
 .gate input:focus{border-color:#b3283f;box-shadow:0 0 0 3px rgba(179,40,63,.28)}
 .gate button{margin-top:14px;width:100%;font-size:16px;font-weight:700;color:#fff;background:#b3283f;
   border:none;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
 .gate button:hover{background:#8f1f32} .gate button:active{transform:translateY(1px)}
 .err{color:#e8a3ac;font-size:13px;min-height:18px;margin-top:10px}

   const pw=document.getElementById('pw').value; const err=document.getElementById('err'); err.textContent="";
   try{
     const enc=new TextEncoder();
     const base=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
     const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['decrypt']);
     const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(BLOB));
     document.open();document.write(new TextDecoder().decode(pt));document.close();
   }catch(e){ err.textContent="Wrong password, try again."; document.getElementById('pw').select(); }
 }
 document.getElementById('go').addEventListener('click',unlock);
 document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script></body></html>
