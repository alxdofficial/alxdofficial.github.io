 .gate input:focus{border-color:#b3283f;box-shadow:0 0 0 3px rgba(179,40,63,.28)}
 .gate button{margin-top:14px;width:100%;font-size:16px;font-weight:700;color:#fff;background:#b3283f;
   border:none;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
 .gate button:hover{background:#8f1f32} .gate button:active{transform:translateY(1px)}
