<style>
 *{box-sizing:border-box}
 html,body{height:100%}
 body{margin:0;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
   padding:20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));
   background:#f7f4f0;color:#221d1b;font-family:"Hanken Grotesk",system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
 .gate{width:100%;max-width:360px;text-align:center;background:#fff;border:1px solid #e8e2db;border-top:3px solid #b0324f;
   border-radius:14px;padding:32px 26px;box-shadow:0 8px 30px rgba(40,25,20,.07)}
 .gate .k{letter-spacing:.05em;text-transform:uppercase;font-size:11px;color:#b0324f;font-weight:700}
 .gate h1{font-size:22px;margin:10px 0 4px;line-height:1.2}
 .gate p{color:#6a615d;font-size:14px;margin:0 0 20px}
 .gate input{width:100%;font-size:20px;text-align:center;letter-spacing:.35em;text-indent:.35em;
   padding:13px 12px;border:1px solid #d6cdc4;border-radius:10px;background:#f8f5f1;color:#221d1b;outline:none;-webkit-appearance:none;appearance:none}
 .gate input::placeholder{color:#c1b6ab}
 .gate input:focus{border-color:#b0324f;box-shadow:0 0 0 3px rgba(176,50,79,.16)}
 .gate button{margin-top:14px;width:100%;font-size:16px;font-weight:700;color:#fff;background:#b0324f;
   border:none;border-radius:10px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
 .gate button:hover{background:#8c2740} .gate button:active{transform:translateY(1px)}
 .err{color:#b0324f;font-size:13px;min-height:18px;margin-top:10px}
 @media (prefers-color-scheme:dark){
   body{background:#16130f;color:#efe7df}
   .gate{background:#211b16;border-color:#2e2620;box-shadow:none}
   .gate p{color:#a89c92} .gate input{background:#211a15;border-color:#3d332b;color:#efe7df}
 }
</style></head>
