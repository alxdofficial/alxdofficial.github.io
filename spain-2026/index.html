<style>
 *{box-sizing:border-box}
 html,body{height:100%}
 body{margin:0;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
   padding:20px;padding-left:max(20px,env(safe-area-inset-left));padding-right:max(20px,env(safe-area-inset-right));

 .gate{width:100%;max-width:360px;text-align:center;background:#fff;border:1px solid #e7ddcd;border-left:5px solid #c0562f;
   border-radius:16px;padding:32px 26px;box-shadow:0 6px 24px rgba(70,50,20,.08)}

 .gate input{width:100%;font-size:20px;text-align:center;letter-spacing:.35em;text-indent:.35em;
   padding:13px 12px;border:1px solid #ddd3a8;border-radius:10px;background:#fbf8f2;color:#2b2118;outline:none;
   -webkit-appearance:none;appearance:none}
 .gate input::placeholder{color:#c8bda8}
 .gate input:focus{border-color:#c0562f;box-shadow:0 0 0 3px rgba(192,86,47,.18)}
 .gate button{margin-top:14px;width:100%;font-size:16px;font-weight:700;color:#fff;background:#c0562f;
   border:none;border-radius:10px;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
 .gate button:hover{background:#9a4023} .gate button:active{transform:translateY(1px)}
 .err{color:#9a4023;font-size:13px;min-height:18px;margin-top:10px}
</style></head>
