     const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},
        base,{name:'AES-GCM',length:256},false,['decrypt']);
     const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(BLOB));
     document.open();document.write(new TextDecoder().decode(pt));document.close();
   }catch(e){ err.textContent="Wrong password — try again."; document.getElementById('pw').select(); }
 }
 document.getElementById('go').addEventListener('click',unlock);
 document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
</script>
